<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUDOKU ELITE | Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <div class="app-wrapper">
        <!-- VIEW 1: AUTH -->
        <section id="view-auth" class="view-section active">
            <div class="auth-container">
                <div class="glitch-logo">SUDOKU<span>ELITE</span></div>
                <div class="glass-card">
                    <i class="fas fa-terminal"></i>
                    <h2>SYSTEM ACCESS</h2>
                    <input type="text" id="username-input" placeholder="Codename..." maxlength="12">
                    <button onclick="handleAuth()" class="action-btn">INITIALIZE</button>
                </div>
            </div>
        </section>

        <!-- VIEW 2: DASHBOARD -->
        <section id="view-dashboard" class="view-section">
            <header class="dashboard-header">
                <div class="profile-chip">
                    <div class="avatar"><i class="fas fa-user-shield"></i></div>
                    <div class="info">
                        <h3 id="profile-name">---</h3>
                        <span id="profile-rank">Rank: Recruit</span>
                    </div>
                </div>
                <button onclick="logout()" class="logout-btn" title="Logout"><i class="fas fa-power-off"></i></button>
            </header>

            <div class="grid-layout">
                <div class="glass-card config-panel">
                    <h3><i class="fas fa-cog"></i> MISSION PARAMS</h3>
                    <div class="param-group">
                        <label>MODE</label>
                        <div class="choice-row">
                            <button id="mode-solo" class="active" onclick="setMode('solo')">CPU</button>
                            <button id="mode-pvp" onclick="setMode('pvp')">PVP</button>
                        </div>
                    </div>
                    <div class="param-group">
                        <label>DIFFICULTY</label>
                        <div class="choice-row">
                            <button class="diff-btn" onclick="setDiff('easy', this)">EASY</button>
                            <button class="diff-btn active" onclick="setDiff('medium', this)">MID</button>
                            <button class="diff-btn" onclick="setDiff('hard', this)">HARD</button>
                        </div>
                    </div>
                    <button onclick="transitionTo('view-game')" class="deploy-btn">DEPLOY TO GRID</button>
                </div>

                <div class="glass-card ranking-panel">
                    <h3><i class="fas fa-trophy"></i> ELITE RANKINGS</h3>
                    <div class="ranking-list" id="global-leaderboard"></div>
                </div>
            </div>
        </section>

        <!-- VIEW 3: GAME -->
        <section id="view-game" class="view-section">
            <div class="game-top-bar">
                <button onclick="confirmExit()" class="exit-btn"><i class="fas fa-times"></i></button>
                <div class="stat-box">
                    <span id="timer">00:00</span>
                    <small id="turn-label">OPERATIVE TURN</small>
                </div>
                <div class="mistake-badge">
                    ERR: <span id="error-val">0/3</span>
                </div>
            </div>

            <div class="game-main">
                <div id="grid" class="sudoku-grid"></div>
                
                <div class="controls-side">
                    <div class="pvp-stats" id="pvp-stats" style="display:none;">
                        <div class="p1-score active" id="p1-ui">P1: <span id="p1-err">0</span></div>
                        <div class="p2-score" id="p2-ui">P2: <span id="p2-err">0</span></div>
                    </div>

                    <div class="numpad" id="numpad"></div>

                    <div class="tool-belt">
                        <button onclick="toggleNotes()" id="note-btn" title="Toggle Notes (N)"><i class="fas fa-pen"></i></button>
                        <button onclick="getHint()" title="Hint (H)"><i class="fas fa-lightbulb"></i></button>
                        <button onclick="confirmReset()" title="Reset"><i class="fas fa-undo"></i></button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- MODAL -->
    <div id="global-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-icon"></div>
            <h2 id="modal-title"></h2>
            <p id="modal-body"></p>
            <div class="modal-btns">
                <button id="modal-cancel" class="cancel-btn">CANCEL</button>
                <button id="modal-confirm" class="confirm-btn">OK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
